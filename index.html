    // ── USDA API ──
    const USDA_API_KEY = "DEMO_KEY";

    const NUTRIENT_ID_MAP = {
      1008:"calories",2048:"calories",1003:"protein",1005:"carbs",1004:"fat",
      1079:"fiber",1106:"vitaminA",1162:"vitaminC",1114:"vitaminD",
      1087:"calcium",1089:"iron",1092:"potassium",1093:"sodium",

    async function searchUSDA(query) {
      const res = await fetch(`${USDA_BASE}/foods/search?api_key=${USDA_API_KEY}&query=${encodeURIComponent(query)}&pageSize=20&dataType=Foundation,SR%20Legacy`);
      if (!res.ok) throw new Error("fail");
      const data = await res.json();
      return (data.foods||[]).map(food => {
        const n = {}; Object.keys(NUTRIENT_GOALS).forEach(k => { n[k] = 0; });
        (food.foodNutrients||[]).forEach(fn => {
          const key = NUTRIENT_ID_MAP[fn.nutrientId];
          if (key && fn.value) { if (key==="calories" && n.calories>0) return; n[key] = Math.round(fn.value*100)/100; }
        });
        return { fdcId: food.fdcId, name: titleCase(food.description||"Unknown"), icon: guessIcon(food.description||""),
          servingInfo: food.servingSize ? `${food.servingSize}${food.servingSizeUnit||'g'}` : "per 100g", source:"usda", ...n };
      });
    }
    function titleCase(s) { return s.toLowerCase().split(/[\s,]+/).filter(Boolean).slice(0,6).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" "); }
    function guessIcon(d) {
      d=d.toLowerCase();
      if(d.includes("chicken")||d.includes("turkey"))return"poultry";if(d.includes("beef")||d.includes("steak")||d.includes("pork")||d.includes("lamb"))return"meat";
      if(d.includes("fish")||d.includes("salmon")||d.includes("tuna")||d.includes("cod")||d.includes("shrimp"))return"seafood";if(d.includes("egg"))return"egg";
      if(d.includes("milk")||d.includes("yogurt")||d.includes("cheese"))return"dairy";
      if(d.includes("bread")||d.includes("wheat")||d.includes("flour")||d.includes("oat")||d.includes("rice")||d.includes("pasta"))return"grain";
      if(d.includes("apple")||d.includes("banana")||d.includes("orange")||d.includes("grape")||d.includes("berr"))return"fruit";

      if(d.includes("oil")||d.includes("butter")||d.includes("honey"))return"fat";return"other";

    const MEAL_TYPES = ["Breakfast","Lunch","Dinner","Snack"];

    function fmtDate(d){return d.toISOString().split("T")[0];}
    function getDaysInRange(start,end){const days=[];const c=new Date(start+"T12:00:00");const e=new Date(end+"T12:00:00");while(c<=e){days.push(fmtDate(c));c.setDate(c.getDate()+1);}return days;}

    // ── Shared Components ──
    function MiniBar({value,max,color}){const p=Math.min((value/max)*100,100);return React.createElement("div",{style:{height:6,borderRadius:3,background:"#EDF2F7",width:"100%",overflow:"hidden"}},React.createElement("div",{style:{height:"100%",width:p+"%",background:color,borderRadius:3,transition:"width 0.5s ease"}}));}

          React.createElement("div",{style:{fontSize:11,color:"var(--text-soft)",marginTop:2,fontWeight:500}},Math.round(rem)+" left")));
    }

    function MacroPill({label,value,max,color,unit="g"}){

        React.createElement("div",{style:{height:8,borderRadius:4,background:"#F0F4F8",overflow:"hidden"}},

    }

    // ── Water Tracker ──
    function WaterTracker({glasses,onAdd,onRemove}){
      const drops = [];
      for(let i=0;i<WATER_GOAL;i++){
        drops.push(React.createElement("button",{key:i,onClick:()=>i<glasses?onRemove():onAdd(),style:{width:36,height:42,border:"none",cursor:"pointer",background:"transparent",padding:0,position:"relative",transition:"transform 0.2s",display:"flex",alignItems:"center",justifyContent:"center"}},

    // ── Suggestions Engine ──
    function generateSuggestions(entries,goals,water){
      const tips = [];
      const allDates = [...new Set(entries.map(e=>e.date))].sort();
      if(allDates.length<5) return [{type:"info",icon:"📊",title:"Keep Logging!",body:"Log at least 5 days of food to unlock personalized suggestions. You have "+allDates.length+" day"+(allDates.length!==1?"s":"")+" so far."}];

      // Analyze last 7 days
      const recent = allDates.slice(-7);
      const avgNutrients = {};
      Object.keys(NUTRIENT_GOALS).forEach(k=>{avgNutrients[k]=0;});
      let totalDays = recent.length;
      recent.forEach(date=>{
        const dayEntries = entries.filter(e=>e.date===date);
        dayEntries.forEach(e=>{Object.keys(NUTRIENT_GOALS).forEach(k=>{avgNutrients[k]+=(e[k]||0)*(e.servings||1);});});
      });
      Object.keys(avgNutrients).forEach(k=>{avgNutrients[k]/=totalDays;});

      // Water analysis
      const waterDays = recent.filter(d=>water[d]&&water[d]>0);
      const avgWater = waterDays.length>0 ? waterDays.reduce((s,d)=>s+(water[d]||0),0)/waterDays.length : 0;

      // Meal pattern analysis
      const mealCounts = {Breakfast:0,Lunch:0,Dinner:0,Snack:0};
      recent.forEach(date=>{
        const dayMeals = new Set(entries.filter(e=>e.date===date).map(e=>e.meal));
        dayMeals.forEach(m=>{if(mealCounts[m]!==undefined)mealCounts[m]++;});
      });

      // Food variety
      const uniqueFoods = new Set(entries.filter(e=>recent.includes(e.date)).map(e=>e.name));
      const foodCategories = {};
      entries.filter(e=>recent.includes(e.date)).forEach(e=>{const cat=e.icon||"other";foodCategories[cat]=(foodCategories[cat]||0)+1;});

      // Generate tips
      // Protein
      if(avgNutrients.protein < goals.protein * 0.7){
        tips.push({type:"nutrient",icon:"💪",title:"Boost Your Protein",body:"You're averaging "+Math.round(avgNutrients.protein)+"g protein/day (goal: "+goals.protein+"g). Try adding Greek yogurt, eggs, or lentils to close the gap.",priority:1});
      } else if(avgNutrients.protein >= goals.protein * 0.9){
        tips.push({type:"win",icon:"🎯",title:"Protein Game Strong!",body:"Averaging "+Math.round(avgNutrients.protein)+"g/day — you're consistently hitting your protein target.",priority:3});
      }
      // Fiber
      if(avgNutrients.fiber < goals.fiber * 0.6){
        tips.push({type:"nutrient",icon:"🌿",title:"More Fiber Needed",body:"Only "+Math.round(avgNutrients.fiber)+"g fiber/day avg (goal: "+goals.fiber+"g). Add berries, lentils, or broccoli — they're fiber powerhouses.",priority:1});
      }
      // Vitamin C
      if(avgNutrients.vitaminC < goals.vitaminC * 0.5){
        tips.push({type:"nutrient",icon:"🍊",title:"Vitamin C Boost",body:"Your vitamin C is low at "+Math.round(avgNutrients.vitaminC)+"mg/day. A cup of broccoli (101mg) or an orange covers most of your daily need.",priority:2});
      }
      // Vitamin D
      if(avgNutrients.vitaminD < goals.vitaminD * 0.5){
        tips.push({type:"nutrient",icon:"☀️",title:"Vitamin D Gap",body:"Averaging only "+Math.round(avgNutrients.vitaminD*10)/10+"mcg/day. Salmon is an excellent source (14mcg per serving), and eggs help too.",priority:2});
      }
      // Iron
      if(avgNutrients.iron < goals.iron * 0.6){

      }

      // Meal suggestions based on gaps
      const gaps = [];
      if(avgNutrients.protein < goals.protein * 0.8) gaps.push("protein");
      if(avgNutrients.fiber < goals.fiber * 0.7) gaps.push("fiber");
      if(avgNutrients.vitaminC < goals.vitaminC * 0.6) gaps.push("vitamin C");
      if(avgNutrients.calcium < goals.calcium * 0.6) gaps.push("calcium");
      if(gaps.length >= 2){

        }
      }

      tips.sort((a,b)=>a.priority-b.priority);
      return tips;
    }
